# =============================================================================
# Greenlens — GitHub Actions CI/CD
# Path in repo: .github/workflows/deploy.yml
#
# Triggers:
#   - push to `main` → build + deploy
#   - manual dispatch with optional tag override
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST           e.g. 203.0.113.42
#   VPS_USER           appuser
#   VPS_SSH_KEY        private key (the public key was added to /home/appuser/.ssh/authorized_keys)
#   GHCR_PAT           Personal Access Token, scope: write:packages, read:packages
#                      (Optional — GITHUB_TOKEN default works if image lives in same repo)
#
# Required GitHub Variables:
#   GITHUB_OWNER       your github username (for image path)
# =============================================================================

name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: commit sha)'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/greenlens-api

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache nuget
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit tests
        run: dotnet test tests/Greenlens.Domain.UnitTests --no-build --configuration Release --verbosity normal

      # Integration tests need Postgres+PostGIS (Testcontainers does this automatically,
      # but increases CI time ~3 min). Comment out if too slow for capstone scope.
      - name: Integration tests
        run: dotnet test tests/Greenlens.Application.IntegrationTests --no-build --configuration Release

  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write                                        # for GHCR
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10
    environment:
      name: production
      # url: https://api.greenlens.example                    # uncomment in Phase 2
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "docker-compose.yml"
          target:   "/opt/greenlens/"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script_stop: true                                  # fail fast on any error
          script: |
            set -euo pipefail
            cd /opt/greenlens

            # Save current image tag for rollback
            CURRENT_TAG=$(grep -oP 'image: ghcr\.io/[^:]+:\K\S+' docker-compose.yml 2>/dev/null || echo "latest")
            echo "Current tag: $CURRENT_TAG"

            # Login to GHCR to pull private image
            echo "${{ secrets.GITHUB_TOKEN }}" \
              | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new image with the SHA tag (deterministic)
            export IMAGE_TAG=sha-${{ github.sha }}
            export GITHUB_OWNER=${{ github.repository_owner }}

            sudo docker compose --env-file .env.production pull api migrator

            # Run migrations (separate one-shot container — see compose.yml `migrator` service)
            sudo docker compose --env-file .env.production run --rm migrator || {
              echo "Migration failed — aborting deploy"
              exit 1
            }

            # Rolling update API only (postgres/redis untouched)
            sudo docker compose --env-file .env.production up -d --no-deps api

            # Wait for healthcheck
            for i in {1..30}; do
              status=$(sudo docker inspect --format='{{.State.Health.Status}}' greenlens-api 2>/dev/null || echo "starting")
              if [ "$status" = "healthy" ]; then
                echo "✅ API healthy"
                break
              fi
              echo "Waiting for healthy ($i/30)... status=$status"
              sleep 2
            done

            # Smoke test from inside the VPS (localhost — bypass Tunnel)
            curl -fsS http://localhost:8080/health || {
              echo "❌ Smoke test failed — rolling back to $CURRENT_TAG"
              export IMAGE_TAG=$CURRENT_TAG
              sudo docker compose --env-file .env.production up -d --no-deps api
              exit 1
            }

            # Cleanup old images (keep last 3)
            sudo docker image prune -f --filter "until=72h"

            echo "✅ Deploy ${{ github.sha }} succeeded"

      - name: Smoke test from public URL (Cloudflare Tunnel)
        if: success()
        run: |
          # Replace with your tunnel URL — set as Variable in GitHub
          # PUBLIC_URL="${{ vars.PUBLIC_API_URL }}"
          # if [ -n "$PUBLIC_URL" ]; then
          #   for i in {1..10}; do
          #     if curl -fsS "$PUBLIC_URL/health"; then
          #       echo "✅ Public smoke test passed"
          #       exit 0
          #     fi
          #     sleep 3
          #   done
          #   echo "❌ Public smoke test failed"
          #   exit 1
          # fi
          echo "Public smoke test skipped — set vars.PUBLIC_API_URL to enable"
