name: Auto-fill PR Description

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  auto-fill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate PR description from commits
        uses: actions/github-script@v7
        with:
          script: |
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const commitList = commits
              .map(c => `- ${c.commit.message.split('\n')[0]}`)
              .join('\n');

            const currentBody = context.payload.pull_request.body || '';

            // Only update if body is empty or just the template
            if (currentBody.includes('<!-- Tóm tắt ngắn gọn')) {
              const newBody = currentBody.replace(
                '<!-- Tóm tắt ngắn gọn về những gì PR này thay đổi -->',
                `<!-- Auto-generated from commits -->\n${commitList}`
              );

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                body: newBody,
              });

              console.log(`Updated PR #${context.payload.pull_request.number} with ${commits.length} commits`);
            }
