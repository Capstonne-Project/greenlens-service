# =============================================================================
# Greenlens — GitHub Actions CI/CD
# Path in repo: .github/workflows/deploy.yml
#
# Triggers:
#   - push to `main` → build + deploy
#   - manual dispatch with optional tag override
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST           e.g. 203.0.113.42
#   VPS_USER           appuser
#   VPS_SSH_KEY        private key (ed25519)
# =============================================================================

name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: commit sha)'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/greenlens-api

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache nuget
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit tests
        run: dotnet test --no-build --configuration Release --verbosity normal

  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "docker-compose.yml"
          target:   "/opt/greenlens/"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/greenlens

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" \
              | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new image
            export IMAGE_TAG=sha-${{ github.sha }}
            export GITHUB_OWNER=${{ github.repository_owner }}

            sudo docker compose --env-file .env.production pull api

            # Rolling update API only (postgres/redis untouched)
            sudo docker compose --env-file .env.production up -d --no-deps api

            # Wait for healthcheck
            for i in $(seq 1 30); do
              status=$(sudo docker inspect --format='{{.State.Health.Status}}' greenlens-api 2>/dev/null || echo "starting")
              if [ "$status" = "healthy" ]; then
                echo "✅ API healthy"
                break
              fi
              echo "Waiting for healthy ($i/30)... status=$status"
              sleep 2
            done

            # Smoke test
            curl -fsS http://localhost:8080/health || {
              echo "❌ Smoke test failed"
              exit 1
            }

            # Cleanup old images (keep last 3 days)
            sudo docker image prune -f --filter "until=72h"

            echo "✅ Deploy ${{ github.sha }} succeeded"
